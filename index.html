<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Syan.id | Official Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom, #e0f2fe, #ffffff);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }
    .profile {
      text-align: center;
      padding: 40px 20px 20px;
    }
    .logo {
      width: 90px;
      height: 90px;
      background: #0284c7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 32px;
      font-weight: 700;
      margin: 0 auto 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }
    h1 { color: #0284c7; font-size: 24px; }
    .tagline { color: #555; font-size: 14px; margin-top: 5px; }

    .product {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .product:hover {
      transform: translateY(-4px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.12);
    }

    .product img {
      width: 100%;
      height: 260px;
      object-fit: cover;
    }

    .product-content {
      padding: 15px;
      text-align: center;
    }

    .product-title {
      font-weight: 600;
      font-size: 16px;
    }

    .price {
      color: #0284c7;
      font-weight: 600;
      margin-top: 5px;
    }

    .button {
      margin-top: 15px;
      background: #0284c7;
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #777;
      padding: 30px 0;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="profile">
      <div class="logo">S</div>
      <h1>Syan.id</h1>
      <div class="tagline">Streetwear | Muslim Wear | Pria | Wanita</div>
    </div>

    <!-- PRODUK 1 -->
    <a href="https://shopee.co.id/LINK-SHOPEE-ANDA-1" target="_blank" class="product">
      <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=900&q=80">
      <div class="product-content">
        <div class="product-title">Streetwear Oversize Tee</div>
        <div class="price">Rp 129.000</div>
        <div class="button">Beli di Shopee</div>
      </div>
    </a>

    <!-- PRODUK 2 -->
    <a href="https://shopee.co.id/LINK-SHOPEE-ANDA-2" target="_blank" class="product">
      <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&w=900&q=80">
      <div class="product-content">
        <div class="product-title">Hoodie Unisex Premium</div>
        <div class="price">Rp 259.000</div>
        <div class="button">Beli di Shopee</div>
      </div>
    </a>

    <!-- PRODUK 3 -->
    <a href="https://shopee.co.id/LINK-SHOPEE-ANDA-3" target="_blank" class="product">
      <img src="https://images.unsplash.com/photo-1602810318383-e386cc2a3ccf?auto=format&fit=crop&w=900&q=80">
      <div class="product-content">
        <div class="product-title">Dress Muslimah Elegant</div>
        <div class="price">Rp 279.000</div>
        <div class="button">Beli di Shopee</div>
      </div>
    </a>

    <!-- PRODUK 4 -->
    <a href="https://shopee.co.id/LINK-SHOPEE-ANDA-4" target="_blank" class="product">
      <img src="https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=900&q=80">
      <div class="product-content">
        <div class="product-title">Blouse Wanita Casual</div>
        <div class="price">Rp 159.000</div>
        <div class="button">Beli di Shopee</div>
      </div>
    </a>

    <footer>
      © 2026 Syan.id — All Rights Reserved
    </footer>
  </div>

</body>
</html>
