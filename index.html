<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syan.id Official</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #ffffff;
  color: #111;
  overflow-x: hidden;
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 1000;
}

header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  letter-spacing: 2px;
}

header a {
  text-decoration: none;
  color: #111;
  font-size: 14px;
}

/* HERO */
.hero {
  height: 85vh;
  background: url('https://via.placeholder.com/1600x900') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: white;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
}

.hero-content {
  position: relative;
  z-index: 2;
}

.hero h2 {
  font-family: 'Playfair Display', serif;
  font-size: 48px;
  font-weight: 600;
  margin-bottom: 15px;
}

.hero p {
  font-size: 16px;
  letter-spacing: 1px;
}

/* SECTION */
.section {
  padding: 80px 8%;
}

.section-title {
  text-align: center;
  margin-bottom: 60px;
  font-family: 'Playfair Display', serif;
  font-size: 32px;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 40px;
}

.product-card {
  overflow: hidden;
  border-radius: 20px;
  transition: 0.4s;
  opacity: 0;
  transform: translateY(40px);
}

.product-card.show {
  opacity: 1;
  transform: translateY(0);
}

.product-card img {
  width: 100%;
  height: 420px;
  object-fit: cover;
  transition: 0.5s;
}

.product-card:hover img {
  transform: scale(1.05);
}

.product-info {
  padding: 20px 10px;
  text-align: center;
}

.product-info h3 {
  font-size: 16px;
  margin-bottom: 8px;
}

.price {
  font-weight: 500;
  margin-bottom: 15px;
}

.shopee-btn {
  display: inline-block;
  padding: 10px 22px;
  border-radius: 30px;
  background: #111;
  color: #fff;
  text-decoration: none;
  font-size: 13px;
  letter-spacing: 1px;
  transition: 0.3s;
}

.shopee-btn:hover {
  background: #ee4d2d;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 50px 20px;
  font-size: 13px;
  color: #777;
}
</style>
</head>

<body>

<header>
  <h1>SYAN.ID</h1>
  <a href="#">Shop Now</a>
</header>

<section class="hero">
  <div class="hero-content">
    <h2>Elevate Your Street Aesthetic</h2>
    <p>Minimal. Clean. Timeless.</p>
  </div>
</section>

<section class="section">
  <h2 class="section-title">Featured Collection</h2>

  <div class="products">

    <div class="product-card">
      <img src="https://via.placeholder.com/600x800" alt="">
      <div class="product-info">
        <h3>Outsi Oversize Tee</h3>
        <div class="price">Rp 129.000</div>
        <a href="https://shopee.co.id/" target="_blank" class="shopee-btn">SHOP ON SHOPEE</a>
      </div>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/600x800" alt="">
      <div class="product-info">
        <h3>Outsi Street Hoodie</h3>
        <div class="price">Rp 249.000</div>
        <a href="https://shopee.co.id/" target="_blank" class="shopee-btn">SHOP ON SHOPEE</a>
      </div>
    </div>

    <div class="product-card">
      <img src="https://via.placeholder.com/600x800" alt="">
      <div class="product-info">
        <h3>Outsi Cargo Pants</h3>
        <div class="price">Rp 289.000</div>
        <a href="https://shopee.co.id/" target="_blank" class="shopee-btn">SHOP ON SHOPEE</a>
      </div>
    </div>

  </div>
</section>

<footer>
  © 2026 SYAN.ID OFFICIAL — Crafted with aesthetic precision.
</footer>

<script>
const cards = document.querySelectorAll('.product-card');

window.addEventListener('scroll', () => {
  cards.forEach(card => {
    const cardTop = card.getBoundingClientRect().top;
    if(cardTop < window.innerHeight - 100){
      card.classList.add('show');
    }
  });
});
</script>

</body>
</html>
